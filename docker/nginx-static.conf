worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
  access_log /dev/stdout main;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  gzip_static on;
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types application/json application/javascript text/css text/plain application/xml text/xml image/svg+xml;

  client_body_temp_path /tmp/nginx-client-body;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets — immutable cache (hashed filenames)
    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Content-Type-Options "nosniff" always;
      try_files $uri =404;
    }

    location /data/ {
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    location /textures/ {
      add_header Cache-Control "public, max-age=86400";
      try_files $uri =404;
    }

    # SPA fallback
    location / {
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Permissions-Policy "storage-access=(self \"https://www.youtube.com\")";
      try_files $uri $uri/ /index.html;
    }
  }
}
